type = "u8"
shift = 4

[[ctu_params.fields]]
name = "saliency"
offset = 4
type = "u8"
shift = 2

[[ctu_params.fields]]
name = "chroma_importance"
offset = 5
type = "u8"
shift = 3

[[ctu_params.fields]]
name = "confidence"
offset = 6
type = "u8"
shift = 4

[[ctu_params.fields]]
