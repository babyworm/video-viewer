shift = 4
min_version = 0

[[ctu_params.fields]]
name = "saliency"
offset = 4
type = "u8"
shift = 2
min_version = 0

[[ctu_params.fields]]
name = "chroma_importance"
offset = 5
type = "u8"
shift = 3
min_version = 0

[[ctu_params.fields]]
name = "confidence"
offset = 6
type = "u8"
shift = 4
min_version = 0

[[ctu_params.fields]]
name = "ctu_flags"
offset = 7
type = "u8"
shift = 5
min_version = 0

[[ctu_params.fields]]
